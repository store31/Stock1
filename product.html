<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<title>Commander</title><style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
max-width:400px;
margin:auto;
padding:25px;
border-radius:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#27ae60;
color:white;
border:none;
font-size:16px;
}

</style></head><body><div class="container"><h2>Commander</h2><form id="form"><input name="name" placeholder="Nom complet" required><input name="phone" placeholder="Téléphone" required><input name="address" placeholder="Adresse" required><select name="wilaya"><option>Oran</option>
<option>Alger</option>
<option>Blida</option></select><input name="product" value="Nike Air Max" hidden><input name="price" value="6500" hidden><button>Commander</button>

</form><p id="msg"></p></div><script>

const API="SCRIPT_URL";

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

fetch(API,{
method:"POST",
body:new FormData(this)
})
.then(()=>{

document.getElementById("msg").innerHTML="✔ Commande envoyée";

this.reset();

});

});

</script></body>
</html>
